[build]
  publish = "."
  functions = "netlify/functions"

[[headers]]
  for = "/lab-compliance/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Cache-Control = "no-store"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "https://worktrailhq.com"
