[build]
  publish = "."
  functions = "netlify/functions"

# Clean, shareable URL for Dr. Hossain's booking page.
# worktrailhq.com/book  ->  serves the booking page (URL stays /book).
[[redirects]]
  from = "/book"
  to = "/products/scheduling/hossain-booking.html"
  status = 200

[[headers]]
  for = "/lab-compliance/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Cache-Control = "no-store"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"
