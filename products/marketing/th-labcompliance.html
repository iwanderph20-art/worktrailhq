<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;}
html,body{width:1080px;height:1080px;overflow:hidden;}
.stage{width:1080px;height:1080px;position:relative;overflow:hidden;
  background:radial-gradient(ellipse 80% 70% at 50% -12%,rgba(79,70,229,.26) 0%,transparent 58%),linear-gradient(165deg,#0B0B14 0%,#09090F 60%,#0D0D1A 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 70px;color:#fff;text-align:center;}
.stage::before{content:"";position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
  background-size:62px 62px;-webkit-mask-image:radial-gradient(ellipse 75% 75% at 50% 42%,#000 42%,transparent 92%);mask-image:radial-gradient(ellipse 75% 75% at 50% 42%,#000 42%,transparent 92%);}
.z{position:relative;z-index:2;}
.eyebrow{display:inline-flex;align-items:center;gap:12px;font-size:22px;font-weight:700;letter-spacing:.26em;text-transform:uppercase;color:#818CF8;margin-bottom:34px;}
.eyebrow::before,.eyebrow::after{content:"";width:30px;height:1px;background:#818CF8;}
.icon{font-size:96px;line-height:1;margin-bottom:26px;}
.title{font-size:118px;font-weight:800;line-height:.94;letter-spacing:-4px;}
.title span{color:#818CF8;}
.sub{font-size:34px;font-weight:500;color:rgba(255,255,255,.6);margin-top:28px;line-height:1.35;max-width:760px;}
.chips{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:46px;max-width:820px;}
.chip{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;padding:12px 24px;border-radius:999px;
  background:rgba(129,140,248,.1);border:1px solid rgba(129,140,248,.28);color:#a5b0f7;}
.pill{margin-top:50px;background:#818CF8;color:#0B0B14;font-weight:800;font-size:28px;padding:16px 40px;border-radius:999px;}
</style>
</head>
<body>
<div class="stage">
  <div class="z eyebrow">CPT · ICD-10 Validator</div>
  <div class="z icon">🧬</div>
  <div class="z title">Lab<br>Compliance <span>Pro</span></div>
  <div class="z sub">Check lab claims against Medicare MAC coverage rules — before you bill.</div>
  <div class="z chips"><span class="chip">All 50 states</span><span class="chip">HIPAA-ready</span><span class="chip">Audit log</span><span class="chip">No PHI</span></div>
  <div class="z pill">Pay once · no subscription</div>
</div>
</body>
</html>
