<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;}
html,body{width:1080px;height:1080px;overflow:hidden;}
.stage{width:1080px;height:1080px;position:relative;overflow:hidden;
  background:linear-gradient(155deg,#1a2b8c 0%,#0f1a5c 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:70px;color:#fff;text-align:center;}
.stage::before{content:"";position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.055) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.055) 1px,transparent 1px);
  background-size:60px 60px;}
.badge{position:relative;z-index:2;font-size:26px;font-weight:800;letter-spacing:3px;color:#9fb0ee;text-transform:uppercase;margin-bottom:26px;}
.icon{position:relative;z-index:2;font-size:120px;line-height:1;margin-bottom:20px;}
.title{position:relative;z-index:2;font-size:104px;font-weight:900;line-height:.98;letter-spacing:-3px;}
.title span{color:#f59e0b;}
.sub{position:relative;z-index:2;font-size:38px;font-weight:600;color:#c7d0f5;margin-top:26px;line-height:1.3;}
.chips{position:relative;z-index:2;display:flex;gap:16px;flex-wrap:wrap;justify-content:center;margin-top:44px;}
.chip{border:2px solid rgba(255,255,255,.32);border-radius:999px;padding:14px 26px;font-size:27px;font-weight:700;color:#eaefff;}
.pill{position:relative;z-index:2;margin-top:46px;background:#f59e0b;color:#1a1a1a;font-weight:900;font-size:32px;padding:16px 36px;border-radius:999px;}
</style>
</head>
<body>
<div class="stage">
  <div class="badge">🪧 Signpost</div>
  <div class="icon">✍️</div>
  <div class="title">Visitor<br><span>Sign-In</span></div>
  <div class="sub">For any building or business</div>
  <div class="chips"><span class="chip">Photo</span><span class="chip">Signature</span><span class="chip">Time log</span></div>
  <div class="pill">Pay once · no fees</div>
</div>
</body>
</html>
