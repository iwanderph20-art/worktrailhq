<!doctype html><html><head><meta charset="utf-8"><style>
  html,body{margin:0;padding:0}
  .stage{width:1200px;height:300px;position:relative;overflow:hidden;
    background-color:#3f3f3c;
    background-image:
      linear-gradient(rgba(255,255,255,.055) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.055) 1px, transparent 1px);
    background-size:34px 34px;
    display:flex;align-items:center;padding:0 66px;box-sizing:border-box;}
  .badge{width:262px;height:262px;flex:0 0 262px;}
  .arc{fill:#f4f2ec;font-family:"Avenir Next","Helvetica Neue",Arial,sans-serif;
    font-size:33px;font-weight:600;letter-spacing:7px;}
  .ctr{fill:#f7f5ef;font-family:"Noteworthy","Marker Felt","Chalkboard SE",sans-serif;
    font-weight:700;font-size:74px;letter-spacing:1px;}
  .divider{width:1px;height:168px;background:rgba(244,242,236,.20);margin:0 52px;}
  .txt{}
  .l1{color:#f7f5ef;font-family:"Noteworthy","Marker Felt","Chalkboard SE",sans-serif;
    font-weight:700;font-size:52px;line-height:1.05;letter-spacing:.5px;}
  .l2{margin-top:18px;color:rgba(244,242,236,.82);
    font-family:"Avenir Next","Helvetica Neue",Arial,sans-serif;font-size:23px;font-weight:500;letter-spacing:.3px;}
</style></head><body>
  <div class="stage">
    <svg class="badge" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <path id="top" d="M 250,250 m -170,0 a 170,170 0 1,1 340,0 a 170,170 0 1,1 -340,0"/>
        <path id="bot" d="M 250,250 m -170,0 a 170,170 0 1,0 340,0 a 170,170 0 1,0 -340,0"/>
      </defs>
      <text class="arc"><textPath href="#top" startOffset="25%" text-anchor="middle">MARKETPLACE</textPath></text>
      <text class="arc"><textPath href="#bot" startOffset="25%" text-anchor="middle">SINCE 2026</textPath></text>
      <text class="ctr" x="250" y="262" text-anchor="middle" dominant-baseline="middle" transform="rotate(-8 250 250)">CURATORS</text>
    </svg>
    <div class="divider"></div>
    <div class="txt">
      <div class="l1">Tools you own.</div>
      <div class="l2">Pay once&nbsp; ·&nbsp; No subscriptions&nbsp; ·&nbsp; Your data, yours</div>
    </div>
  </div>
</body></html>
