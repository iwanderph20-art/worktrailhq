<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;}
html,body{width:1080px;height:1080px;overflow:hidden;}
.stage{width:1080px;height:1080px;position:relative;overflow:hidden;
  background:linear-gradient(155deg,#2a4d78 0%,#14243b 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:70px;color:#fff;text-align:center;}
.stage::before{content:"";position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.055) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.055) 1px,transparent 1px);
  background-size:60px 60px;}
.badge{position:relative;z-index:2;font-size:26px;font-weight:800;letter-spacing:3px;color:#a9c0dd;text-transform:uppercase;margin-bottom:24px;}
.icon{position:relative;z-index:2;font-size:118px;line-height:1;margin-bottom:18px;}
.title{position:relative;z-index:2;font-size:108px;font-weight:900;line-height:.98;letter-spacing:-3px;}
.title span{color:#e8c17a;}
.sub{position:relative;z-index:2;font-size:37px;font-weight:600;color:#c7d6e8;margin-top:24px;line-height:1.3;}
.chips{position:relative;z-index:2;display:flex;gap:15px;flex-wrap:wrap;justify-content:center;margin-top:42px;max-width:820px;}
.chip{border:2px solid rgba(255,255,255,.34);border-radius:999px;padding:13px 25px;font-size:26px;font-weight:700;color:#eaf1f9;}
.pill{position:relative;z-index:2;margin-top:44px;background:#e8c17a;color:#3a2a08;font-weight:900;font-size:31px;padding:16px 36px;border-radius:999px;}
</style>
</head>
<body>
<div class="stage">
  <div class="badge">⚖️ Client Intake</div>
  <div class="icon">📋</div>
  <div class="title">Client<br><span>Intake</span></div>
  <div class="sub">A pro intake form for law firms</div>
  <div class="chips"><span class="chip">Estate</span><span class="chip">Elder Law</span><span class="chip">Litigation</span><span class="chip">Guardianship</span><span class="chip">Probate</span></div>
  <div class="pill">Pay once · no fees</div>
</div>
</body>
</html>
