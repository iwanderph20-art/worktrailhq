<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;}
html,body{width:1080px;height:1080px;overflow:hidden;}
.stage{width:1080px;height:1080px;background:#F5F4F0;padding:74px 72px;display:flex;flex-direction:column;position:relative;overflow:hidden;}
.stage::after{content:"";position:absolute;top:-160px;right:-160px;width:520px;height:520px;border-radius:50%;background:radial-gradient(circle,rgba(91,91,214,.13),transparent 70%);}
.kicker{position:relative;z-index:2;font-size:24px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:#5b5bd6;margin-bottom:22px;}
.h1{position:relative;z-index:2;font-size:96px;font-weight:900;letter-spacing:-3px;line-height:.98;color:#26252A;}
.h1 span{color:#5b5bd6;}
.sub{position:relative;z-index:2;font-size:31px;font-weight:500;color:#6b675f;margin-top:22px;}

.card{position:relative;z-index:2;margin-top:44px;background:#fff;border:1px solid #ecebe6;border-radius:26px;padding:34px 34px 38px;box-shadow:0 30px 60px -28px rgba(40,37,42,.4);}
.card-top{display:flex;align-items:center;gap:16px;margin-bottom:24px;}
.card-ic{width:64px;height:64px;border-radius:16px;background:#eeeefc;display:flex;align-items:center;justify-content:center;font-size:32px;}
.card-nm{font-size:29px;font-weight:900;color:#26252A;}
.card-mt{font-size:20px;font-weight:700;color:#8a857c;margin-top:2px;}
.pt{font-size:19px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:#9a958c;margin-bottom:16px;}
.slots{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;}
.slot{border:2px solid #e6e4dd;border-radius:14px;padding:20px 6px;text-align:center;font-size:26px;font-weight:900;color:#26252A;font-variant-numeric:tabular-nums;}
.slot.pick{border-color:#5b5bd6;background:#5b5bd6;color:#fff;box-shadow:0 12px 24px -10px rgba(91,91,214,.6);}
.slot.gone{color:#c7c3ba;border-style:dashed;text-decoration:line-through;}

.foot{position:relative;z-index:2;margin-top:auto;display:flex;align-items:center;justify-content:space-between;padding-top:32px;}
.pill{background:#26252A;color:#fff;font-weight:900;font-size:30px;padding:16px 36px;border-radius:999px;}
.url{font-size:24px;font-weight:800;color:#9a958c;}
</style>
</head>
<body>
<div class="stage">
  <div class="kicker">📅 Appointment Booking</div>
  <div class="h1">Book me,<br>your <span>way.</span></div>
  <div class="sub">Self-serve scheduling in one file — no monthly fee.</div>

  <div class="card">
    <div class="card-top">
      <div class="card-ic">🦷</div>
      <div><div class="card-nm">Cleaning &amp; checkup</div><div class="card-mt">60 min · $120</div></div>
    </div>
    <div class="pt">Pick a time — Tue, Jul 14</div>
    <div class="slots">
      <div class="slot">9:00</div>
      <div class="slot gone">9:30</div>
      <div class="slot pick">10:30</div>
      <div class="slot">12:00</div>
    </div>
  </div>

  <div class="foot">
    <div class="pill">Pay once · no fees</div>
    <div class="url">worktrailhq.com</div>
  </div>
</div>
</body>
</html>
