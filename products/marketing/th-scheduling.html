<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;}
html,body{width:1080px;height:1080px;overflow:hidden;}
.stage{width:1080px;height:1080px;position:relative;overflow:hidden;
  background:linear-gradient(155deg,#6d5ae0 0%,#3d3aa0 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:70px;color:#fff;text-align:center;}
.stage::before{content:"";position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.06) 1px,transparent 1px);
  background-size:60px 60px;}
.badge{position:relative;z-index:2;font-size:25px;font-weight:800;letter-spacing:2.5px;color:#c8c2f2;text-transform:uppercase;margin-bottom:22px;}
.icon{position:relative;z-index:2;font-size:112px;line-height:1;margin-bottom:16px;}
.title{position:relative;z-index:2;font-size:100px;font-weight:900;line-height:.98;letter-spacing:-3px;}
.title span{color:#f4c96b;}
.sub{position:relative;z-index:2;font-size:36px;font-weight:600;color:#dcd8f7;margin-top:22px;line-height:1.3;}
.chips{position:relative;z-index:2;display:flex;gap:15px;flex-wrap:wrap;justify-content:center;margin-top:40px;max-width:860px;}
.chip{border:2px solid rgba(255,255,255,.36);border-radius:999px;padding:13px 25px;font-size:25px;font-weight:700;color:#eceafb;}
.pill{position:relative;z-index:2;margin-top:42px;background:#f4c96b;color:#5a4310;font-weight:900;font-size:31px;padding:16px 38px;border-radius:999px;}
</style>
</head>
<body>
<div class="stage">
  <div class="badge">📅 Appointment Booking</div>
  <div class="icon">🗓️</div>
  <div class="title">Appointment<br><span>Booking</span></div>
  <div class="sub">Self-serve scheduling in one file</div>
  <div class="chips"><span class="chip">Live availability</span><span class="chip">No double-booking</span><span class="chip">Embed or link</span></div>
  <div class="pill">Pay once · no fees</div>
</div>
</body>
</html>
