<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Signpost — Visitor Sign-In</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --brand:#2a9d8f;        /* neutral teal (default) */
  --brand-dark:#21867a;
  --brand-light:#e4f3f1;
  --g50:#f7f9f9;--g100:#eef2f2;--g200:#e2e7e7;--g300:#cdd4d4;
  --g400:#98a2a2;--g500:#6b7676;--g600:#4b5555;--g800:#232b2b;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--g50);color:var(--g800);min-height:100vh;-webkit-tap-highlight-color:transparent;}
button{cursor:pointer;font-family:inherit;border:none;background:none;}
input,textarea{font-family:inherit;font-size:16px;}
.hidden{display:none!important;}

/* ── HEADER ── */
.hdr{background:#fff;border-bottom:1px solid var(--g200);padding:14px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:20;}
.hdr-brand{display:flex;align-items:center;gap:12px;flex:1;min-width:0;}
#hdrLogo{max-height:44px;max-width:170px;object-fit:contain;}
#hdrLogoPh{width:44px;height:44px;border-radius:10px;background:var(--brand-light);color:var(--brand);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.hdr-name{font-size:19px;font-weight:800;color:var(--g800);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hdr-btn{color:var(--g500);font-size:13px;font-weight:700;padding:9px 12px;border-radius:10px;background:var(--g100);}
.hdr-btn:hover{background:var(--g200);}

/* ── LAYOUT ── */
.wrap{max-width:640px;margin:0 auto;padding:26px 18px 60px;}
.card{background:#fff;border:1px solid var(--g200);border-radius:20px;padding:30px;box-shadow:0 6px 26px rgba(20,40,40,.05);}
.form-title{font-size:24px;font-weight:900;letter-spacing:-.5px;margin-bottom:4px;}
.form-sub{font-size:14px;color:var(--g500);margin-bottom:26px;}

.field{margin-bottom:20px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
label.lbl{font-size:12px;font-weight:800;color:var(--g600);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:7px;}
label.lbl .req{color:#e05252;}
.inp{width:100%;padding:14px;border:1.5px solid var(--g200);border-radius:12px;color:var(--g800);outline:none;background:#fff;transition:border-color .15s;}
.inp:focus{border-color:var(--brand);}

/* purpose checkboxes */
.checks{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.chk{display:flex;align-items:center;gap:11px;border:1.5px solid var(--g200);border-radius:12px;padding:13px 15px;cursor:pointer;font-size:15px;font-weight:600;color:var(--g600);user-select:none;transition:border-color .15s,background .15s;}
.chk .box{width:22px;height:22px;border-radius:6px;border:2px solid var(--g300);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:900;transition:all .12s;}
.chk.on{border-color:var(--brand);background:var(--brand-light);color:var(--brand-dark);}
.chk.on .box{background:var(--brand);border-color:var(--brand);}

/* photo / ID placeholder */
.photo-ph{border:2px dashed var(--g300);border-radius:14px;background:var(--g100);min-height:150px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:22px;cursor:pointer;overflow:hidden;position:relative;}
.photo-ph:hover{border-color:var(--brand);}
.photo-ph .ico{font-size:32px;margin-bottom:8px;}
.photo-ph .t{font-size:14px;font-weight:700;color:var(--g600);}
.photo-ph .s{font-size:12px;color:var(--g400);margin-top:3px;}
.photo-ph img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.photo-clear{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.55);color:#fff;border-radius:8px;padding:5px 10px;font-size:12px;font-weight:700;z-index:2;}

/* signature */
.sig-box{border:1.5px solid var(--g200);border-radius:14px;background:#fff;position:relative;overflow:hidden;}
.sig-box canvas{display:block;width:100%;height:150px;touch-action:none;}
.sig-line{position:absolute;bottom:26px;left:22px;right:22px;border-bottom:1.5px solid var(--g200);pointer-events:none;}
.sig-x{position:absolute;bottom:28px;left:22px;color:var(--g400);font-size:16px;pointer-events:none;}
.sig-hint{position:absolute;bottom:6px;left:22px;color:var(--g400);font-size:11px;font-weight:700;pointer-events:none;}
.sig-clear{position:absolute;top:8px;right:10px;font-size:12px;font-weight:700;color:var(--g500);background:var(--g100);border-radius:8px;padding:5px 10px;}

/* buttons */
.actions{display:flex;gap:12px;margin-top:28px;}
.btn{border-radius:14px;font-weight:800;font-size:16px;padding:16px;transition:opacity .15s,background .15s;}
.btn-primary{background:var(--brand);color:#fff;flex:1;}
.btn-primary:hover{opacity:.9;}
.btn-clear{background:var(--g100);color:var(--g600);}

/* ── MODAL ── */
.modal{position:fixed;inset:0;background:rgba(20,30,30,.5);display:none;align-items:flex-start;justify-content:center;z-index:100;padding:24px 16px;overflow-y:auto;}
.modal.open{display:flex;}
.sheet{background:#fff;border-radius:20px;width:100%;max-width:560px;padding:26px;box-shadow:0 24px 60px rgba(0,0,0,.3);}
.sheet-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.sheet-top h2{font-size:19px;font-weight:900;}
.sheet-close{font-size:26px;color:var(--g400);line-height:1;padding:2px 8px;}
.color-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:4px;}
.color-sw{width:42px;height:42px;border-radius:12px;border:3px solid transparent;position:relative;}
.color-sw.sel{border-color:var(--g800);}
.color-sw.sel::after{content:"✓";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:18px;}
.logo-prev{max-height:48px;max-width:170px;object-fit:contain;margin-top:10px;display:block;}
.file-btn{display:inline-block;background:var(--g100);color:var(--g600);font-weight:700;font-size:14px;padding:11px 18px;border-radius:12px;cursor:pointer;margin-top:6px;}

/* ── RECORDS ── */
.rec{border:1px solid var(--g200);border-radius:14px;padding:14px;margin-bottom:10px;}
.rec-top{display:flex;gap:12px;align-items:flex-start;}
.rec-photo{width:52px;height:52px;border-radius:10px;object-fit:cover;background:var(--g100);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--g400);font-weight:800;}
.rec-nm{font-weight:800;font-size:16px;}
.rec-sub{font-size:13px;color:var(--g500);margin-top:2px;}
.rec-times{font-size:12px;color:var(--g600);margin-top:10px;padding-top:10px;border-top:1px solid var(--g100);display:flex;gap:18px;flex-wrap:wrap;}
.rec-times b{color:var(--g800);}
.rec-sig{margin-top:8px;}.rec-sig img{height:34px;}
.empty{text-align:center;color:var(--g400);padding:44px 20px;font-weight:600;}
.rec-tools{display:flex;gap:10px;margin-bottom:16px;}
.rec-tools .inp{flex:1;}
.tool-btn{background:var(--brand-light);color:var(--brand-dark);font-weight:800;font-size:14px;padding:0 16px;border-radius:12px;}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--g800);color:#fff;padding:12px 22px;border-radius:12px;font-size:14px;font-weight:700;z-index:2000;opacity:0;transition:opacity .2s;pointer-events:none;}
.toast.show{opacity:1;}
@media(max-width:460px){.checks{grid-template-columns:1fr;}}
</style>
</head>
<body>

<!-- ── HEADER ── -->
<div class="hdr">
  <div class="hdr-brand">
    <div id="hdrLogoPh">🪧</div>
    <img id="hdrLogo" class="hidden" alt="">
    <div class="hdr-name" id="hdrName">Visitor Sign-In</div>
  </div>
  <button class="hdr-btn" onclick="openRecords()">Records</button>
  <button class="hdr-btn" onclick="openCustomize()">⚙ Customize</button>
</div>

<!-- ── INTAKE FORM ── -->
<div class="wrap">
  <div class="card">
    <div class="form-title">Visitor Sign-In</div>
    <div class="form-sub">Please complete the fields below.</div>

    <div class="row2 field">
      <div>
        <label class="lbl">Date</label>
        <input class="inp" type="date" id="fDate">
      </div>
      <div>
        <label class="lbl">Time in</label>
        <input class="inp" type="time" id="fTimeIn">
      </div>
    </div>

    <div class="field">
      <label class="lbl">Visitor name <span class="req">*</span></label>
      <input class="inp" id="fName" placeholder="Full name" autocomplete="off">
    </div>

    <div class="field">
      <label class="lbl">Company / Affiliation</label>
      <input class="inp" id="fCompany" placeholder="(optional)" autocomplete="off">
    </div>

    <div class="field">
      <label class="lbl">Purpose of visit</label>
      <div class="checks" id="purposeChecks">
        <div class="chk" data-p="Business"><span class="box"></span>Business</div>
        <div class="chk" data-p="Delivery"><span class="box"></span>Delivery</div>
        <div class="chk" data-p="Personal"><span class="box"></span>Personal</div>
        <div class="chk" data-p="Other"><span class="box"></span>Other</div>
      </div>
      <input class="inp" id="fOther" placeholder="If other, please specify…" style="margin-top:10px;">
    </div>

    <div class="row2 field">
      <div>
        <label class="lbl">Time out</label>
        <input class="inp" type="time" id="fTimeOut" placeholder="On exit">
      </div>
      <div>
        <label class="lbl">Photo / ID</label>
        <label class="photo-ph" id="photoPh">
          <input type="file" accept="image/*" capture="environment" style="display:none" onchange="onPhoto(event)">
          <div id="photoInner"><div class="ico">🪪</div><div class="t">Add photo / ID</div><div class="s">Tap to capture or upload</div></div>
          <img id="photoImg" class="hidden" alt="">
          <span class="photo-clear hidden" id="photoClear" onclick="clearPhoto(event)">Remove</span>
        </label>
      </div>
    </div>

    <div class="field">
      <label class="lbl">Signature</label>
      <div class="sig-box">
        <canvas id="sigCanvas"></canvas>
        <div class="sig-x">✕</div>
        <div class="sig-line"></div>
        <div class="sig-hint">Sign above</div>
        <button class="sig-clear" onclick="clearSig()">Clear</button>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-clear" onclick="resetForm(true)">Clear</button>
      <button class="btn btn-primary" onclick="saveEntry()">Save entry</button>
    </div>
  </div>
</div>

<!-- ── CUSTOMIZE MODAL ── -->
<div class="modal" id="customizeModal">
  <div class="sheet">
    <div class="sheet-top"><h2>Customize header</h2><button class="sheet-close" onclick="close_('customizeModal')">×</button></div>
    <div class="field">
      <label class="lbl">Business name</label>
      <input class="inp" id="setName" placeholder="Your business name">
    </div>
    <div class="field">
      <label class="lbl">Logo</label>
      <label class="file-btn">Upload logo<input type="file" accept="image/*" style="display:none" onchange="onLogo(event)"></label>
      <img id="setLogoPrev" class="logo-prev hidden" alt="">
      <button class="hdr-btn hidden" id="setLogoRemove" style="margin-top:10px" onclick="removeLogo()">Remove logo</button>
    </div>
    <div class="field">
      <label class="lbl">Brand color</label>
      <div class="color-row" id="colorRow"></div>
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="saveCustomize()">Save</button>
  </div>
</div>

<!-- ── RECORDS MODAL ── -->
<div class="modal" id="recordsModal">
  <div class="sheet">
    <div class="sheet-top"><h2>Visitor records</h2><button class="sheet-close" onclick="close_('recordsModal')">×</button></div>
    <div class="rec-tools">
      <input class="inp" id="recSearch" placeholder="Search name…" oninput="renderRecords()">
      <button class="tool-btn" onclick="exportCSV()">⬇ CSV</button>
      <button class="tool-btn" onclick="window.print()">🖨</button>
    </div>
    <div id="recList"></div>
    <button class="hdr-btn" style="color:#e05252;margin-top:12px" onclick="clearAll()">Delete all records</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ── STATE ── */
const LS_REC='signpost_records', LS_SET='signpost_settings';
const DEFAULTS={ name:'Visitor Sign-In', logo:'', color:'#2a9d8f' };
let settings = load(LS_SET, DEFAULTS);
let records  = load(LS_REC, []);
let purposes=[], photoData='', pendingLogo=undefined, pendingColor='';

function load(k,def){ try{ const v=JSON.parse(localStorage.getItem(k)); if(v==null) return def; return Array.isArray(def)?v:{...def,...v}; }catch(e){ return def; } }
function saveLS(){ localStorage.setItem(LS_REC,JSON.stringify(records)); localStorage.setItem(LS_SET,JSON.stringify(settings)); }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1800); }
function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function pad(n){ return String(n).padStart(2,'0'); }

/* ── THEME / HEADER ── */
function applyTheme(){
  document.documentElement.style.setProperty('--brand', settings.color);
  document.documentElement.style.setProperty('--brand-dark', shade(settings.color,-24));
  document.documentElement.style.setProperty('--brand-light', shade(settings.color,88));
  const ph=document.getElementById('hdrLogoPh'), lg=document.getElementById('hdrLogo');
  if(settings.logo){ lg.src=settings.logo; lg.classList.remove('hidden'); ph.classList.add('hidden'); }
  else { lg.classList.add('hidden'); ph.classList.remove('hidden'); }
  document.getElementById('hdrName').textContent = settings.name || 'Visitor Sign-In';
}
function shade(hex,pct){ const n=parseInt(hex.slice(1),16); const r=n>>16,g=(n>>8)&255,b=n&255;
  const f=v=> pct<0 ? Math.round(v*(1+pct/100)) : Math.round(v+(255-v)*pct/100);
  return '#'+[f(r),f(g),f(b)].map(v=>Math.max(0,Math.min(255,v)).toString(16).padStart(2,'0')).join(''); }

/* ── FORM ── */
function initForm(){
  const now=new Date();
  document.getElementById('fDate').value = now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate());
  document.getElementById('fTimeIn').value = pad(now.getHours())+':'+pad(now.getMinutes());
}
document.querySelectorAll('#purposeChecks .chk').forEach(c=>{
  c.onclick=()=>{ const p=c.dataset.p; c.classList.toggle('on');
    if(c.classList.contains('on')) purposes.push(p); else purposes=purposes.filter(x=>x!==p); };
});
function resetForm(refill){
  ['fName','fCompany','fOther','fTimeOut'].forEach(id=>document.getElementById(id).value='');
  purposes=[]; document.querySelectorAll('#purposeChecks .chk').forEach(c=>c.classList.remove('on'));
  clearPhoto(); clearSig(); if(refill) initForm();
}
function saveEntry(){
  const name=document.getElementById('fName').value.trim();
  if(!name){ toast('Please enter a visitor name'); return; }
  const rec={ id:Date.now(),
    date:document.getElementById('fDate').value,
    timeIn:document.getElementById('fTimeIn').value,
    timeOut:document.getElementById('fTimeOut').value,
    name, company:document.getElementById('fCompany').value.trim(),
    purposes:[...purposes], other:document.getElementById('fOther').value.trim(),
    photo:photoData, signature:getSigData() };
  records.unshift(rec); saveLS(); resetForm(true); toast('Entry saved ✓');
}

/* ── PHOTO / ID ── */
function onPhoto(e){ const f=e.target.files[0]; if(!f) return; const r=new FileReader();
  r.onload=()=>shrink(r.result,720,d=>{ photoData=d; showPhoto(); }); r.readAsDataURL(f); }
function showPhoto(){ const im=document.getElementById('photoImg'); im.src=photoData; im.classList.remove('hidden');
  document.getElementById('photoInner').classList.add('hidden'); document.getElementById('photoClear').classList.remove('hidden'); }
function clearPhoto(e){ if(e) e.preventDefault(); photoData='';
  document.getElementById('photoImg').classList.add('hidden'); document.getElementById('photoInner').classList.remove('hidden');
  document.getElementById('photoClear').classList.add('hidden'); }
function shrink(dataURL,max,cb){ const img=new Image(); img.onload=()=>{ const s=Math.min(1,max/img.width);
  const c=document.createElement('canvas'); c.width=img.width*s; c.height=img.height*s;
  c.getContext('2d').drawImage(img,0,0,c.width,c.height); cb(c.toDataURL('image/jpeg',0.72)); }; img.src=dataURL; }

/* ── SIGNATURE ── */
let sigCtx,sigDrawing=false,sigDirty=false;
function setupSig(){ const c=document.getElementById('sigCanvas'); const r=c.getBoundingClientRect(); const dpr=window.devicePixelRatio||1;
  c.width=r.width*dpr; c.height=150*dpr; sigCtx=c.getContext('2d'); sigCtx.scale(dpr,dpr);
  sigCtx.lineWidth=2.4; sigCtx.lineCap='round'; sigCtx.strokeStyle='#232b2b'; sigDirty=false;
  const pos=e=>{ const b=c.getBoundingClientRect(); const t=e.touches?e.touches[0]:e; return [t.clientX-b.left,t.clientY-b.top]; };
  const start=e=>{ e.preventDefault(); sigDrawing=true; sigDirty=true; const[x,y]=pos(e); sigCtx.beginPath(); sigCtx.moveTo(x,y); };
  const move=e=>{ if(!sigDrawing)return; e.preventDefault(); const[x,y]=pos(e); sigCtx.lineTo(x,y); sigCtx.stroke(); };
  const end=()=>sigDrawing=false;
  c.onmousedown=start; c.onmousemove=move; window.addEventListener('mouseup',end);
  c.ontouchstart=start; c.ontouchmove=move; c.ontouchend=end; }
function clearSig(){ const c=document.getElementById('sigCanvas'); if(sigCtx&&c) sigCtx.clearRect(0,0,c.width,c.height); sigDirty=false; }
function getSigData(){ return sigDirty ? document.getElementById('sigCanvas').toDataURL('image/png') : ''; }

/* ── CUSTOMIZE ── */
const PALETTE=['#2a9d8f','#0f766e','#3b6b8f','#64748b','#7c5cbf','#c26d3f','#3a7d44','#b0476b','#1f2937'];
function openCustomize(){
  pendingLogo=undefined; pendingColor=settings.color;
  document.getElementById('setName').value=settings.name;
  const lp=document.getElementById('setLogoPrev'), rm=document.getElementById('setLogoRemove');
  if(settings.logo){ lp.src=settings.logo; lp.classList.remove('hidden'); rm.classList.remove('hidden'); } else { lp.classList.add('hidden'); rm.classList.add('hidden'); }
  renderColors(); open_('customizeModal');
}
function renderColors(){ const cr=document.getElementById('colorRow'); cr.innerHTML='';
  PALETTE.forEach(c=>{ const d=document.createElement('div'); d.className='color-sw'+(c===pendingColor?' sel':''); d.style.background=c;
    d.onclick=()=>{ pendingColor=c; renderColors(); }; cr.appendChild(d); }); }
function onLogo(e){ const f=e.target.files[0]; if(!f) return; const r=new FileReader();
  r.onload=()=>shrink(r.result,440,d=>{ pendingLogo=d; const lp=document.getElementById('setLogoPrev');
    lp.src=d; lp.classList.remove('hidden'); document.getElementById('setLogoRemove').classList.remove('hidden'); }); r.readAsDataURL(f); }
function removeLogo(){ pendingLogo=''; document.getElementById('setLogoPrev').classList.add('hidden'); document.getElementById('setLogoRemove').classList.add('hidden'); }
function saveCustomize(){
  settings.name=document.getElementById('setName').value.trim()||'Visitor Sign-In';
  if(pendingLogo!==undefined) settings.logo=pendingLogo;
  settings.color=pendingColor||settings.color;
  saveLS(); applyTheme(); close_('customizeModal'); toast('Saved ✓');
}

/* ── RECORDS ── */
function openRecords(){ renderRecords(); open_('recordsModal'); }
function renderRecords(){
  const q=(document.getElementById('recSearch').value||'').toLowerCase();
  const list=records.filter(r=>r.name.toLowerCase().includes(q));
  const el=document.getElementById('recList');
  if(!list.length){ el.innerHTML='<div class="empty">No visitor records yet.</div>'; return; }
  el.innerHTML=list.map(r=>{
    const photo = r.photo ? `<img class="rec-photo" src="${r.photo}">` : `<div class="rec-photo">🪪</div>`;
    const purp=[...(r.purposes||[]),r.other].filter(Boolean).map(esc).join(', ');
    const sig = r.signature ? `<div class="rec-sig"><img src="${r.signature}"></div>` : '';
    return `<div class="rec"><div class="rec-top">${photo}<div><div class="rec-nm">${esc(r.name)}</div>
      <div class="rec-sub">${[esc(r.company),purp].filter(Boolean).join(' · ')||'—'}</div></div></div>
      <div class="rec-times"><span>📅 <b>${esc(r.date)||'—'}</b></span><span>In <b>${esc(r.timeIn)||'—'}</b></span><span>Out <b>${esc(r.timeOut)||'—'}</b></span></div>
      ${sig}</div>`;
  }).join('');
}
function exportCSV(){
  const head=['Date','Time In','Time Out','Visitor Name','Company/Affiliation','Purpose'];
  const rows=records.map(r=>[r.date,r.timeIn,r.timeOut,r.name,r.company,[...(r.purposes||[]),r.other].filter(Boolean).join('; ')]
    .map(v=>`"${(v||'').replace(/"/g,'""')}"`).join(','));
  const csv=[head.join(','),...rows].join('\n');
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='visitor-log-'+new Date().toISOString().slice(0,10)+'.csv'; a.click(); toast('CSV downloaded');
}
function clearAll(){ if(confirm('Delete ALL visitor records permanently?')){ records=[]; saveLS(); renderRecords(); toast('All records deleted'); } }

/* ── MODAL HELPERS ── */
function open_(id){ document.getElementById(id).classList.add('open'); }
function close_(id){ document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal').forEach(m=>m.addEventListener('click',e=>{ if(e.target===m) m.classList.remove('open'); }));

/* ── INIT ── */
applyTheme(); initForm(); setTimeout(setupSig,60);
window.addEventListener('resize',()=>{ const d=sigDirty; setupSig(); });
</script>
</body>
</html>
